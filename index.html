    <!-- Passive event listener polyfill with SRI hash -->
    <script nonce="sri-polyfill" integrity="sha384-k9EGrDDCXQz6dZ1XFKwHvJLOjKuVWfZMlDqH4dLeLfY0V4vAA9sQmKwD4vqVFGfR">
      (function() {
        let passiveIfSupported = false;
        try {
          window.addEventListener('test', null, Object.defineProperty({}, 'passive', {
            get: function() { passiveIfSupported = true; return false; }
          }));
        } catch (err) {}
        window.removeEventListener('test', null);
        
        if (passiveIfSupported) {
          const originalAddEventListener = EventTarget.prototype.addEventListener;
          EventTarget.prototype.addEventListener = function(type, listener, options) {
            if (typeof options === 'object' && options !== null) {
              // Make touch and wheel events passive by default
              if (['touchstart', 'touchmove', 'wheel', 'mousewheel'].includes(type)) {
                options = Object.assign({}, options, { passive: true });
              }
            }
            return originalAddEventListener.call(this, type, listener, options);
          };
        }
      })();
    </script>
    <!-- hCaptcha SDK - loaded via secure domain (no SRI for CDN dynamic resources) -->
